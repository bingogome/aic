name: test

on:
  push:
    branches: [main]
    paths:
      - 'aic_utils/**'
      - 'pixi.toml'
      - 'pixi.lock'
      - '!**/*.md'
  pull_request:
    paths:
      - 'aic_utils/**'
      - 'pixi.toml'
      - 'pixi.lock'
      - '!**/*.md'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.2
        with:
          pixi-version: v0.63.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          activate-environment: true
          # Only install the default environment in CI. The `pi05` environment
          # has editable path deps to a local openpi checkout (see README) and
          # cannot be solved on a clean CI runner.
          environments: default
      - name: unit tests
        run: pytest aic_utils/aic_rlt/tests/ -v --tb=short
